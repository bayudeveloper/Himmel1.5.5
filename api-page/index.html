<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://files.catbox.moe/rbfc5x.jpg" type="image/jpeg">
    <title>Himmel API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Clouds Animation -->
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>

    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="loader">
            <img src="https://files.catbox.moe/7sayat.jpg" alt="chibi" class="loader-chibi">
            <div class="loader-spinner"></div>
            <p class="loader-text">Himmel API</p>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand">
                <span id="header" class="brand-text">Himmel-Apii</span>
                <span id="versionHeader" class="brand-version">Online</span>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <!-- Banner Image -->
        <div class="banner-wrapper">
            <img id="dynamicImage" class="banner" src="https://files.catbox.moe/hp1onn.jpg" alt="banner">
        </div>

        <!-- Title Section -->
        <div class="title-section">
            <h1 id="name" class="main-title">Himmel-Apii</h1>
            <span id="version" class="version-badge">1.5.5</span>
        </div>
        
        <p id="description" class="description">Simple and Easy-to-Use API Documentation</p>

        <!-- Links -->
        <div id="apiLinks" class="links">
            <a href="#">About Me</a>
            <a href="#">Contact Me</a>
            <a href="#">About Me | バニ</a>
            <a href="#">Contact Me | 接触</a>
        </div>

        <!-- Search -->
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Search API...">
        </div>

        <!-- API Content -->
        <div id="apiContent" class="api-content"></div>
    </main>

    <!-- Modal -->
    <div class="modal fade" id="apiResponseModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <h5 class="modal-title" id="apiResponseModalLabel"></h5>
                        <p class="modal-subtitle" id="apiResponseModalDesc"></p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <pre id="apiEndpoint" class="code-block"></pre>
                    <div id="apiQueryInputContainer"></div>
                    <div id="apiResponseLoading" class="spinner-wrapper d-none">
                        <div class="spinner"></div>
                    </div>
                    <pre id="apiResponseContent" class="code-block d-none"></pre>
                </div>
                <div class="modal-footer">
                    <button id="submitQueryBtn" class="btn-submit">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
