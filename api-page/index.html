<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <link rel="icon" href="https://files.catbox.moe/rbfc5x.jpg" type="image/jpeg">
    <title id="page">Himmel API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Simple Clouds -->
    <div class="cloud-bg"></div>
    <div class="cloud-bg cloud-2"></div>

    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="loading-content">
            <img src="https://files.catbox.moe/7sayat.jpg" alt="chibi" class="loading-chibi">
            <div class="loading-spinner"></div>
            <p class="loading-text">Loading...</p>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand">
                <span id="header">Himmel</span>
                <span id="versionHeader" class="nav-version">v1.0</span>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <!-- Banner -->
        <div class="banner-wrapper">
            <img id="dynamicImage" class="banner" src="" alt="banner">
        </div>

        <!-- Title Section -->
        <div class="title-section">
            <h1 id="name">Himmel API</h1>
            <span id="version" class="version-badge">v1.0</span>
        </div>
        
        <p id="description" class="description">Simple and Easy-to-Use API Documentation</p>

        <!-- Links -->
        <div id="apiLinks" class="api-links">
            <a href="#">About Me</a>
            <a href="#">Contact Me</a>
        </div>

        <!-- Search -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search API...">
        </div>

        <!-- API Content -->
        <div id="apiContent" class="api-content"></div>
    </main>

    <!-- Modal -->
    <div class="modal fade" id="apiResponseModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <h5 class="modal-title" id="apiResponseModalLabel"></h5>
                        <p class="modal-subtitle" id="apiResponseModalDesc"></p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <pre id="apiEndpoint" class="code-block"></pre>
                    <div id="apiQueryInputContainer"></div>
                    <div id="apiResponseLoading" class="loading-spinner-center d-none">
                        <div class="spinner"></div>
                    </div>
                    <pre id="apiResponseContent" class="code-block d-none"></pre>
                </div>
                <div class="modal-footer">
                    <button id="submitQueryBtn" class="btn-submit">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
